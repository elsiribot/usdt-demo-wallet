# getrandom 0.3 on wasm32-unknown-unknown needs both the `wasm_js` crate
# feature (enabled in Cargo.toml) and this backend cfg selected at build time.
# See https://docs.rs/getrandom/latest/getrandom/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
